<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Portal de Conscientização</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="s-logo">
          <svg viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4.26l5 2.22V11c0 3.54-2.35 6.89-5 8.07-2.65-1.18-5-4.53-5-8.07V7.48l5-2.22z"/>
          </svg>
        </div>
        <span id="sidebarTitle">Segurança TI</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>

        <a class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 16 16">
            <path d="M0 0h7v7H0V0zm1 1v5h5V1H1zM8 0h7v7H8V0zm1 1v5h5V1H9zM0 8h7v7H0V8zm1 1v5h5V9H1zM8 8h7v7H8V8zm1 1v5h5V9H9z"/>
          </svg>
          Painel de Controle
        </a>

        <a class="nav-item" data-page="colaboradores">
          <svg viewBox="0 0 16 16">
            <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002H7.022zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816zM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275zM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
          </svg>
          Colaboradores
        </a>

        <div class="nav-section-label" style="margin-top:8px">Sistema</div>

        <a class="nav-item" data-page="settings">
          <svg viewBox="0 0 16 16">
            <path d="M7.068.727c.243-.97 1.62-.97 1.864 0l.071.286a.96.96 0 0 0 1.622.434l.205-.211c.695-.719 1.888-.03 1.613.931l-.08.284a.96.96 0 0 0 1.187 1.187l.283-.081c.96-.275 1.65.918.931 1.613l-.211.205a.96.96 0 0 0 .434 1.622l.286.071c.97.243.97 1.62 0 1.864l-.286.071a.96.96 0 0 0-.434 1.622l.211.205c.719.695.03 1.888-.931 1.613l-.284-.08a.96.96 0 0 0-1.187 1.187l.081.283c.275.96-.918 1.65-1.613.931l-.205-.211a.96.96 0 0 0-1.622.434l-.071.286c-.243.97-1.62.97-1.864 0l-.071-.286a.96.96 0 0 0-1.622-.434l-.205.211c-.695.719-1.888.03-1.613-.931l.08-.284a.96.96 0 0 0-1.186-1.187l-.284.081c-.96.275-1.65-.918-.931-1.613l.211-.205a.96.96 0 0 0-.434-1.622l-.286-.071c-.97-.243-.97-1.62 0-1.864l.286-.071a.96.96 0 0 0 .434-1.622l-.211-.205c-.719-.695-.03-1.888.931-1.613l.284.08a.96.96 0 0 0 1.187-1.186l-.081-.284c-.275-.96.918-1.65 1.613-.931l.205.211a.96.96 0 0 0 1.622-.434l.071-.286zM12.973 8.5H8.25l-2.834 3.779A4.998 4.998 0 0 0 12.973 8.5zm0-1a4.998 4.998 0 0 0-7.557-3.779l2.834 3.78h4.723zM5.048 3.967c-.03.021-.058.043-.087.065l.087-.065zm-.431.355A4.984 4.984 0 0 0 3.002 8c0 1.455.622 2.765 1.615 3.678L7.375 8 4.617 4.322zm.344 7.765l.087.065-.087-.065z"/>
          </svg>
          Configurações
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-pill" id="logoutBtn" title="Sair">
          <div class="user-avatar" id="userInitials">AD</div>
          <div class="user-info">
            <strong id="userName">Administrador</strong>
            <span id="userRole">Administrador</span>
          </div>
          <svg class="logout-icon" viewBox="0 0 16 16">
            <path d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
            <path d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
          </svg>
        </div>
      </div>
    </aside>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN AREA -->
    <div class="main-area">

      <!-- TOPBAR -->
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <svg viewBox="0 0 16 16">
            <path d="M2.5 12a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11zm0-4a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-11z"/>
          </svg>
        </button>

        <span class="topbar-title" id="pageTitle">Painel de Controle</span>

        <div class="topbar-actions">
          <div class="topbar-badge" id="campaignBadge">
            <svg viewBox="0 0 16 16">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" transform="scale(0.67) translate(2,2)"/>
            </svg>
            <span id="campaignLabel">Campanha Ativa</span>
          </div>

          <button class="btn-export" onclick="window.location.reload()" title="Atualizar">
            <svg viewBox="0 0 16 16">
              <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
              <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/>
            </svg>
            Atualizar
          </button>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="pageContent">
        <!-- Renderizado dinamicamente pelo dashboard.js -->
      </main>

    </div><!-- /main-area -->
  </div><!-- /app-shell -->

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- SCRIPTS -->
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS (XLSX) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>

  <script>
    /* Inicializa título da sidebar a partir das configurações */
    document.addEventListener('DOMContentLoaded', () => {
      const s = Data.getSettings();
      const sideTitle = document.getElementById('sidebarTitle');
      const campLabel = document.getElementById('campaignLabel');
      if (sideTitle && s.logoText)     sideTitle.textContent = s.logoText;
      if (campLabel  && s.campaignName) campLabel.textContent = s.campaignName;
      document.title = (s.logoText || 'Portal') + ' — Dashboard';
    });
  </script>
</body>
</html>
